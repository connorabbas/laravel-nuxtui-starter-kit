name: Build and Deploy (Swarm)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-swarm
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run tests
        run: php artisan test --compact

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

  build:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and push image
        uses: serversideup/github-action-docker-build@v6
        with:
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPOSITORY }}:main
          registry: ghcr.io
          registry-username: ${{ github.repository_owner }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          dockerfile: ./Dockerfile
          target: ssr-release
          platforms: linux/amd64

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy stack to Docker Swarm
        uses: serversideup/github-action-docker-swarm-deploy@v3
        with:
          stack_name: ${{ secrets.SWARM_STACK_NAME }}
          docker_compose_file_path: '-c docker-compose-swarm.yml'
          ssh_deploy_private_key: ${{ secrets.SSH_DEPLOY_PRIVATE_KEY }}
          ssh_deploy_user: ${{ secrets.SSH_DEPLOY_USER }}
          ssh_remote_hostname: ${{ secrets.SSH_REMOTE_HOSTNAME }}
          ssh_remote_port: '22'
          ssh_remote_known_hosts: ${{ secrets.SSH_REMOTE_KNOWN_HOSTS }}
          registry: ghcr.io
          registry-username: ${{ github.repository_owner }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}
          env_file_base64: ${{ secrets.PRODUCTION_ENV_FILE_BASE64 }}

      - name: Run Laravel post-deploy commands
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_REMOTE_HOSTNAME }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_PRIVATE_KEY }}
          port: 22
          script: |
            APP_CONTAINER_ID=$(docker ps --filter "label=com.docker.swarm.service.name=${{ secrets.SWARM_STACK_NAME }}_laravel" --format '{{.ID}}' | head -n 1)

            if [ -z "$APP_CONTAINER_ID" ]; then
              echo "Could not find a running container for ${{ secrets.SWARM_STACK_NAME }}_laravel"
              exit 1
            fi

            docker exec "$APP_CONTAINER_ID" php artisan migrate --force
            docker exec "$APP_CONTAINER_ID" php artisan optimize:clear
            docker exec "$APP_CONTAINER_ID" php artisan optimize
            docker exec "$APP_CONTAINER_ID" php artisan inertia:check-ssr
