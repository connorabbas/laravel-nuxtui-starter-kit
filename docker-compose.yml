services:
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
      target: ssr-release
    restart: always
    env_file: '.env'
    environment:
      PHP_OPCACHE_ENABLE: '1'
      SSL_MODE: 'mixed'
    volumes:
      - 'storage-public:/var/www/html/storage/app/public/'
      - 'storage-sessions:/var/www/html/storage/framework/sessions'
      - 'storage-logs:/var/www/html/storage/logs'
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.laravel-nuxtui-starter.rule=Host(`${APP_DOMAIN}`)'
      - 'traefik.http.routers.laravel-nuxtui-starter.entrypoints=websecure'
      - 'traefik.http.routers.laravel-nuxtui-starter.tls=true'
      - 'traefik.http.routers.laravel-nuxtui-starter.tls.certresolver=letsencrypt'
      - 'traefik.http.services.laravel-nuxtui-starter.loadbalancer.server.port=8080' # exposed http port from serversideup image
      # Health check
      - 'traefik.http.services.laravel-nuxtui-starter.loadbalancer.healthcheck.path=/healthcheck'
      - 'traefik.http.services.laravel-nuxtui-starter.loadbalancer.healthcheck.interval=30s'
      - 'traefik.http.services.laravel-nuxtui-starter.loadbalancer.healthcheck.timeout=5s'
      - 'traefik.http.services.laravel-nuxtui-starter.loadbalancer.healthcheck.scheme=http'
    networks:
      - proxy
      - web
    depends_on:
      - pgsql

  pgsql:
    image: postgres:17
    restart: always
    #ports:
      #- '${FORWARD_DB_PORT:-5432}:5432' # expose forwarded port if we need to connect to dbms client
    environment:
      POSTGRES_DB: '${DB_DATABASE}'
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - web
      #- proxy # expose to proxy network if we need to connect to dbms client
    healthcheck:
      test: ['CMD', 'pg_isready', '-q', '-d', '${DB_DATABASE}', '-U', '${DB_USERNAME}']
      retries: 3
      timeout: 5s

volumes:
  postgres-data:
  storage-public:
  storage-sessions:
  storage-logs:

networks:
  web:
  proxy:
    name: traefik_network # Already setup and running via different /traefik specific compose file/project
    external: true
